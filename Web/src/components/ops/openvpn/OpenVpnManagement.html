<section class="admin-panel ops-management-page">
  <div class="query-panel">
    <div class="query-header">
      <div>
        <h3>VPN管理</h3>
      </div>
    </div>
  </div>

  <div v-if="visibleTabs.length === 0" class="admin-warning">当前用户没有 OpenVPN 管理权限，无法访问该模块。</div>

  <section v-else class="resource-list">
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>模块</th><th>说明</th><th>操作</th></tr>
        </thead>
        <tbody>
          <tr v-for="tab in visibleTabs" :key="tab.key">
            <td>{{ tab.label }}</td>
            <td>进入{{ tab.label }}独立管理界面</td>
            <td class="action-cell">
              <button type="button" class="primary-button" @click="openModule(tab)">进入</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</section>
