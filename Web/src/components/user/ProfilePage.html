<section class="profile-page">
  <div v-if="updating" class="profile-loading">
    <div class="profile-loading-box">保存中...</div>
  </div>

  <h2>个人资料</h2>
  <form class="profile-form" @submit.prevent="handleUpdate">
    <label>
      <span>用户名</span>
      <input v-model="username" type="text" required />
    </label>
    <label>
      <span>昵称</span>
      <input v-model="nickname" type="text" />
    </label>
    <label>
      <span>性别</span>
      <select v-model="gender">
        <option value="">未设置</option>
        <option value="男">男</option>
        <option value="女">女</option>
        <option value="保密">保密</option>
      </select>
    </label>
    <label>
      <span>邮箱</span>
      <input v-model="email" type="email" required />
    </label>
    <label>
      <span>联系方式</span>
      <textarea v-model="contactsText" rows="3" placeholder="每行填写一个联系方式"></textarea>
    </label>
    <label>
      <span>新密码</span>
      <input v-model="password" type="password" placeholder="留空则不修改" />
    </label>
    <button type="submit" class="primary-button" :disabled="updating">
      {{ updating ? '保存中...' : '保存修改' }}
    </button>
  </form>
  <p v-if="message" class="info-message">{{ message }}</p>
  <div class="profile-meta">
    <p>用户ID：{{ user?.id }}</p>
    <p>昵称：{{ user?.nickname || '-' }}</p>
    <p>性别：{{ user?.gender || '-' }}</p>
    <p>联系方式：{{ user?.contacts?.length ? user.contacts.join('、') : '-' }}</p>
    <p>管理员：{{ user?.is_admin ? '是' : '否' }}</p>
    <p>激活状态：{{ user?.is_active ? '激活' : '停用' }}</p>
  </div>
</section>
