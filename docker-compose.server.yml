services:
  backend:
    build:
      context: ./backend
    container_name: oim-backend
    restart: unless-stopped
    env_file:
      - ./backend/docker.env
    volumes:
      - ./data/oim:/data/oim
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ping', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - oim

  web:
    build:
      context: ./Web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: oim-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - oim

networks:
  oim:
    external: true
    name: oim-shared
